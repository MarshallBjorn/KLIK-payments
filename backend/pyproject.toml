[tool.ruff]
line-length = 100
target-version = "py312"
exclude = [
    ".venv",
    "venv",
    "migrations",
    "__pycache__",
    ".git",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # pyflakes
    "I",      # isort (sortowanie importów)
    "B",      # flake8-bugbear (typowe bugi)
    "C4",     # flake8-comprehensions
    "UP",     # pyupgrade (modernizacja składni)
    "DJ",     # flake8-django
    "S",      # flake8-bandit (security)
    "N",      # pep8-naming
]
ignore = [
    "E501",   # line-too-long (formatter się tym zajmuje)
    "S101",   # assert używany w testach (OK)
    "S105",   # hardcoded password (false positives w testach)
    "S106",   # hardcoded password func arg (j/w)
]

[tool.ruff.lint.per-file-ignores]
"*/tests/*" = ["S"]                  # security checks luźniejsze w testach
"*/migrations/*" = ["E", "W", "F"]   # migrations są generowane, nie czepiamy się
"*/settings/*" = ["F405", "F403"]    # star imports w settings to standard

[tool.ruff.format]
quote-style = "single"
indent-style = "space"

[tool.pytest.ini_options]
DJANGO_SETTINGS_MODULE = "core.settings.dev"
python_files = ["test_*.py", "*_test.py", "tests.py"]
addopts = [
    "--strict-markers",
    "--strict-config",
    "--cov=.",
    "--cov-report=term-missing",
    "--cov-report=html",
    "-ra",
]
markers = [
    "slow: marks tests as slow (deselect with '-m \"not slow\"')",
    "integration: marks integration tests",
    "unit: marks unit tests",
]

[tool.coverage.run]
omit = [
    "*/migrations/*",
    "*/tests/*",
    "manage.py",
    "*/settings/*",
    "*/wsgi.py",
    "*/asgi.py",
]

[tool.coverage.report]
exclude_lines = [
    "pragma: no cover",
    "raise NotImplementedError",
    "if TYPE_CHECKING:",
    "if __name__ == .__main__.:",
]
