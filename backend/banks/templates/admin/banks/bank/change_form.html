{% extends "admin/change_form.html" %}
{% load static %}

{% block object-tools-items %}
    {% if original %}
        <li>
            <form method="post"
                  action="{% url 'admin:banks_bank_rotate_api_key' original.pk %}"
                  style="display:inline"
                  onsubmit="return confirm('Wygenerować nowy klucz API? Stary klucz przestanie działać natychmiast.');">
                {% csrf_token %}
                <button type="submit" class="historylink" style="cursor:pointer;border:none;">
                    Wygeneruj nowy klucz API
                </button>
            </form>
        </li>
    {% endif %}
    {{ block.super }}
{% endblock %}
