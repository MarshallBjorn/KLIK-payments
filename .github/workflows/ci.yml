name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install ruff
        run: pip install ruff==0.8.4

      - name: Run ruff check
        run: ruff check backend/

      - name: Run ruff format check
        run: ruff format --check backend/

  test:
    name: Tests
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: klik
          POSTGRES_PASSWORD: testpassword # pragma: allowlist secret
          POSTGRES_DB: klik_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DJANGO_SETTINGS_MODULE: core.settings.dev
      SECRET_KEY: test-secret-key-for-ci-only # pragma: allowlist secret
      DEBUG: 'True'
      ALLOWED_HOSTS: localhost,127.0.0.1
      DATABASE_URL: postgres://klik:testpassword@localhost:5432/klik_test # pragma: allowlist secret
      REDIS_URL: redis://localhost:6379/0
      CELERY_BROKER_URL: redis://localhost:6379/1
      CELERY_RESULT_BACKEND: redis://localhost:6379/2
      KLIK_CODE_TTL_SECONDS: 120
      SESSION_INTERVAL_MINUTES_PL: 1440
      SESSION_INTERVAL_MINUTES_EU: 1440
      SESSION_INTERVAL_MINUTES_UK: 1440
      SESSION_INTERVAL_MINUTES_US: 1440
      RTGS_TIMEOUT_SECONDS: 30
      SORBNET3_URL: http://mock:9000/sorbnet3
      TARGET2_URL: http://mock:9000/target2
      CHAPS_URL: http://mock:9000/chaps
      FEDNOW_URL: http://mock:9000/fednow

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        working-directory: backend
        run: pip install -r requirements.txt

      - name: Run migrations
        working-directory: backend
        run: python manage.py migrate

      - name: Run tests
        working-directory: backend
        run: pytest

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-html
          path: backend/htmlcov/

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          push: false
          tags: klik-backend:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
